name: release

# Tag-driven, reproducible releases (spec §12). darwin targets build on
# matching-arch macOS runners; musl targets build natively-cross on glibc Linux
# runners with musl-tools (the ci.yml recipe) — no containers, so the JS actions
# get the glibc Node they require. Every triple's binary is fully static.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.triple }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-apple-darwin
            os: macos-latest
            budget: 1572864
          # Cross-compiled on the arm64 runner (Apple's toolchain is universal):
          # GitHub is retiring the Intel macos-13 runners, and x86_64 code runs
          # ~16% larger than arm64, hence the higher budget (spec §8).
          - triple: x86_64-apple-darwin
            os: macos-latest
            budget: 1677721
          - triple: x86_64-unknown-linux-musl
            os: ubuntu-latest
            budget: 2097152
          - triple: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            budget: 2097152
    steps:
      # No container: JS actions (checkout) need glibc Node, which fails in an
      # Alpine/musl container. Build musl natively-cross on the glibc runner
      # with musl-tools (the recipe ci.yml already uses for x86_64-musl).
      - uses: actions/checkout@v7
      - name: musl deps
        if: contains(matrix.triple, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: rustup toolchain install stable --profile minimal && rustup target add ${{ matrix.triple }}
      - run: cargo build --release --target ${{ matrix.triple }}
      - name: size gate (spec §8)
        run: scripts/ci/size-gate.sh target/${{ matrix.triple }}/release/adyton ${{ matrix.budget }}
      - name: verify static (musl)
        if: contains(matrix.triple, 'linux-musl')
        run: file target/${{ matrix.triple }}/release/adyton | grep -q static
      - name: package
        # COPYFILE_DISABLE stops macOS bsdtar embedding ._* / xattr entries that
        # make GNU tar warn on extraction (seen in the S17 install test).
        run: |
          name="adyton-${GITHUB_REF_NAME}-${{ matrix.triple }}"
          COPYFILE_DISABLE=1 tar -czf "$name.tar.gz" -C target/${{ matrix.triple }}/release adyton
      - uses: actions/upload-artifact@v7
        with:
          name: adyton-${{ matrix.triple }}
          path: adyton-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: cd dist && shasum -a 256 *.tar.gz > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: release notes from CHANGELOG
        # The tag's section becomes the Release body — human notes, not a commit
        # dump (we push straight to main). Fail loud if the section is missing.
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            index($0, "## [" v "]") == 1 { grab = 1; next }
            grab && index($0, "## [") == 1 { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::CHANGELOG.md has no section for ${ver}"; exit 1
          fi
          cat notes.md
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          body_path: notes.md
          fail_on_unmatched_files: true

  # S20: render the Homebrew formula from the release checksums and push it to
  # the tap. No-ops until Metalnib/homebrew-tap exists and a TAP_TOKEN secret
  # (a PAT with contents:write on that repo) is set — so it never blocks a release.
  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: render + push formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN unset — skipping Homebrew tap update"; exit 0
          fi
          ver="${TAG#v}"
          curl -fsSL -o sums "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/SHA256SUMS.txt"
          sha() { awk -v a="adyton-${TAG}-$1.tar.gz" '$2 == a { print $1 }' sums; }
          sed \
            -e "s/{{VERSION}}/${ver}/g" \
            -e "s/{{SHA256_AARCH64_APPLE_DARWIN}}/$(sha aarch64-apple-darwin)/" \
            -e "s/{{SHA256_X86_64_APPLE_DARWIN}}/$(sha x86_64-apple-darwin)/" \
            -e "s/{{SHA256_AARCH64_UNKNOWN_LINUX_MUSL}}/$(sha aarch64-unknown-linux-musl)/" \
            -e "s/{{SHA256_X86_64_UNKNOWN_LINUX_MUSL}}/$(sha x86_64-unknown-linux-musl)/" \
            contrib/homebrew/adyton.rb > adyton.rb
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Metalnib/homebrew-tap" tap
          mkdir -p tap/Formula
          cp adyton.rb tap/Formula/adyton.rb
          cd tap
          git config user.name "adyton-release"
          git config user.email "release@users.noreply.github.com"
          git add Formula/adyton.rb
          git commit -m "adyton ${ver}" && git push
